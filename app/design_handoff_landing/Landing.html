<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TheHomeFile · CARFAX for your home</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* Editorial palette (default) */
    --bg: #F2EEE6;
    --paper: #FAF7F1;
    --ink: #1B1A17;
    --ink-2: #38352F;
    --ink-3: #6E695F;
    --ink-4: #A39C8E;
    --rule: #D8D1C2;
    --rule-soft: #E5DFD2;
    --slate: #4A5A78;
    --slate-soft: #C7CFDD;
    --accent: #6B2D2A;
    --accent-soft: #E8D6CF;
    --gold: #8C6E3A;
    --gold-soft: #E8DEC6;
    --green: #4F6650;
    --green-soft: #D5DECF;

    --serif: 'Fraunces', 'Instrument Serif', Georgia, serif;
    --sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;

    --radius: 4px;
    --radius-lg: 6px;

    --hero-display: clamp(56px, 9vw, 132px);
    --section-display: clamp(40px, 5.5vw, 80px);
  }

  /* Marketing Bold variant — applied via [data-aesthetic="bold"] on body */
  body[data-aesthetic="bold"] {
    --bg: #F2EEE6;
    --paper: #FFFFFF;
    --ink: #0E0D0B;
    --hero-display: clamp(64px, 12vw, 180px);
    --section-display: clamp(44px, 7vw, 110px);
  }

  /* Dark tone: slate variant — swaps the deep darks to dark slate-blue.
     Keeps mid-greys and cream warm so the editorial cream pages still feel
     warm; only the "dark moments" (AI section, CTA card, footer-on-dark,
     primary buttons) shift to slate. Body text is also slate, not warm. */
  body[data-dark-tone="slate"] {
    --ink: #1B2540;
    --ink-2: #2F3A55;
  }
  body[data-dark-tone="slate"][data-aesthetic="bold"] {
    --ink: #111A30;
  }

  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
  }
  * { box-sizing: border-box; }

  /* Type primitives — same vocab as the app */
  .display {
    font-family: var(--serif);
    font-weight: 350;
    letter-spacing: -0.02em;
    line-height: 1.0;
  }
  .display-italic {
    font-family: var(--serif);
    font-weight: 350;
    font-style: italic;
    letter-spacing: -0.012em;
  }
  body[data-aesthetic="bold"] .display {
    font-weight: 400;
    letter-spacing: -0.035em;
    line-height: 0.92;
  }
  body[data-aesthetic="bold"] .display-italic {
    font-weight: 400;
    letter-spacing: -0.025em;
  }

  .eyebrow {
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 500;
  }
  .num {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .label-sm { font-size: 12.5px; color: var(--ink-3); letter-spacing: 0.01em; }

  .hr { height: 1px; background: var(--rule); border: 0; }
  .hr-soft { height: 1px; background: var(--rule-soft); border: 0; }

  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 40px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  /* Buttons */
  .btn {
    font: inherit;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    line-height: 1;
    text-decoration: none;
  }
  .btn:hover { background: #fff; border-color: var(--ink-3); transform: translateY(-1px); }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); color: var(--paper); }
  .btn-lg { padding: 14px 22px; font-size: 14.5px; }

  .input {
    font: inherit;
    font-family: var(--sans);
    font-size: 14px;
    padding: 12px 14px;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    width: 100%;
    transition: border-color 140ms ease, background 140ms ease;
  }
  .input:focus { outline: none; border-color: var(--ink); background: #fff; }

  /* Tags / chips */
  .tag {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 7px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink-3);
    line-height: 1.4;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .tag-ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  /* Selection */
  ::selection { background: var(--ink); color: var(--paper); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

  /* Hairline section divider with file number */
  .file-mark {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 12px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .file-mark .num-badge {
    display: inline-block;
    padding: 1px 6px;
    border: 1px solid var(--rule);
    color: var(--ink-2);
    border-radius: 2px;
  }

  /* Marquee */
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee {
    display: flex;
    gap: 56px;
    white-space: nowrap;
    animation: marquee 50s linear infinite;
    width: max-content;
  }
  .marquee-mask {
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent 0, var(--bg) 80px, var(--bg) calc(100% - 80px), transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0, var(--bg) 80px, var(--bg) calc(100% - 80px), transparent 100%);
  }

  /* Reveal on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 700ms cubic-bezier(0.2, 0.7, 0.2, 1), transform 700ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }

  /* Floating bits in hero — placeholder, replaced by mockup component */
  .mock-placeholder {
    background:
      repeating-linear-gradient(135deg, var(--rule-soft) 0 1px, transparent 1px 14px),
      var(--paper);
    border: 1px solid var(--rule);
    border-radius: 28px;
    aspect-ratio: 9 / 19.5;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  /* Floating annotation cards (will be wired up later) */
  .annot {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    box-shadow: 0 12px 32px -16px rgba(27,26,23,0.18);
    max-width: 220px;
  }

  /* Sticky nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule-soft);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
  }
  .nav-links {
    display: flex;
    gap: 28px;
    align-items: center;
    font-size: 13.5px;
  }
  .nav-links a {
    color: var(--ink-2);
    text-decoration: none;
    transition: color 140ms ease;
  }
  .nav-links a:hover { color: var(--ink); }
  @media (max-width: 760px) {
    .nav-links { display: none; }
  }

  /* Wordmark */
  .wordmark {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.012em;
    color: var(--ink);
    text-decoration: none;
    line-height: 1;
  }
  .wordmark .it { font-style: italic; font-weight: 350; }

  /* Hero */
  .hero {
    padding: 60px 0 80px;
    position: relative;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 60px;
    align-items: center;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  .hero-display {
    font-family: var(--serif);
    font-weight: 350;
    letter-spacing: -0.025em;
    line-height: 0.95;
    font-size: var(--hero-display);
    margin: 0;
  }
  body[data-aesthetic="bold"] .hero-display {
    font-weight: 400;
    letter-spacing: -0.04em;
    line-height: 0.88;
  }

  /* Stat / feature ledger row */
  .ledger {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .ledger > div {
    padding: 24px 28px;
    border-right: 1px solid var(--rule);
  }
  .ledger > div:first-child { padding-left: 0; }
  .ledger > div:last-child { border-right: 0; padding-right: 0; }
  @media (max-width: 760px) {
    .ledger { grid-template-columns: repeat(2, 1fr); }
    .ledger > div { padding: 18px; border-bottom: 1px solid var(--rule); }
    .ledger > div:nth-child(2n) { border-right: 0; }
    .ledger > div:first-child { padding-left: 18px; }
    .ledger > div:last-child { padding-right: 18px; }
  }

  /* Feature columns */
  .three-col {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--rule);
  }
  .three-col > article {
    padding: 32px 28px 36px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .three-col > article:nth-child(3n) { border-right: 0; }
  @media (max-width: 980px) {
    .three-col { grid-template-columns: 1fr; }
    .three-col > article { border-right: 0; }
  }

  /* Reveal helper for inline reveals on first paint */
  .ifade { animation: fadeUp 800ms cubic-bezier(0.2, 0.7, 0.2, 1) both; }
  .ifade.d1 { animation-delay: 80ms; }
  .ifade.d2 { animation-delay: 160ms; }
  .ifade.d3 { animation-delay: 240ms; }
  .ifade.d4 { animation-delay: 320ms; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Underline link */
  .ulink {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-3);
    padding-bottom: 1px;
    transition: border-color 140ms ease;
  }
  .ulink:hover { border-color: var(--ink); }

  /* Quote / pull */
  .pull {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(28px, 3.4vw, 48px);
    font-weight: 350;
    line-height: 1.18;
    letter-spacing: -0.012em;
  }

  /* CTA card */
  .cta-card {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: var(--radius-lg);
    padding: 56px 48px;
  }
  .cta-card .display { color: var(--paper); }
  .cta-card .eyebrow { color: var(--ink-4); }
  .cta-card .input { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); color: var(--paper); }
  .cta-card .input::placeholder { color: rgba(255,255,255,0.5); }
  .cta-card .input:focus { background: rgba(255,255,255,0.1); border-color: var(--paper); }
  .cta-card .btn { background: var(--paper); color: var(--ink); border-color: var(--paper); }

  /* Footer */
  .footer {
    border-top: 1px solid var(--rule);
    padding: 40px 0 60px;
    color: var(--ink-3);
    font-size: 13px;
  }
  .footer a { color: var(--ink-2); text-decoration: none; }
  .footer a:hover { color: var(--ink); }
</style>
</head>
<body data-aesthetic="editorial">
<div id="root"></div>

<!-- Aesthetic + analytics shell -->
<script>
  (function () {
    // Reveal-on-scroll
    document.addEventListener('DOMContentLoaded', () => {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });
      // Re-attach observer for nodes that mount later (React)
      const watch = () => document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
      watch();
      window.__rewatchReveal = watch;
    });
  })();
</script>

<!-- Tweaks panel helpers -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Landing components -->
<script type="text/babel" src="components/landing-icons.jsx"></script>
<script type="text/babel" src="components/landing-mockup.jsx"></script>
<script type="text/babel" src="components/landing-app.jsx" data-presets="env,react"></script>
</body>
